name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: concrete-ops-ai-starter

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: concrete-ops-ai-starter/package-lock.json

      - name: Guard npm lockfile as source of truth
        run: |
          set -e
          if [ -f pnpm-lock.yaml ]; then
            echo "pnpm-lock.yaml should not be committed in concrete-ops-ai-starter. Use npm and package-lock.json only."
            exit 1
          fi

      - name: Install dependencies
        run: |
          set -e
          npm ci

      - name: Run build
        run: |
          set -e
          npm run build

      - name: Run tests
        run: |
          set -e
          npm test
          echo 'Tests completed successfully.'

      - name: Debug information
        run: |
          echo 'Node version:'
          node -v
          echo 'NPM version:'
          npm -v
