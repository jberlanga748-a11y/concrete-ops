name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          set -e
          npm ci

      - name: Run build
        run: |
          set -e
          npm run build

      - name: Run tests
        run: |
          set -e
          npm test
          echo 'Tests completed successfully.'

      - name: Debug information
        run: |
          echo 'Node version:'
          node -v
          echo 'NPM version:'
          npm -v
