name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: concrete-ops-ai-starter

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: concrete-ops-ai-starter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

      - name: Run build
        run: npm run build

      - name: Run tests (if configured)
        run: |
          if node -e "const s=require('./package.json').scripts||{}; process.exit(s.test ? 0 : 1)"; then
            npm test
          else
            echo "No test script defined in concrete-ops-ai-starter/package.json; skipping tests."
          fi

      - name: Debug information
        run: |
          echo "Node version:"
          node -v
          echo "NPM version:"
          npm -v
